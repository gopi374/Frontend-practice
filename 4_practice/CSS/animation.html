<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background-color: #a2db46;
        }
        body{
            display: flex;
            justify-content: space-between;
        }
        .parent {
            position: relative;
            /* border-bottom: 5px solid black; */
            width: 205px;
            /* border-bottom-left-radius: 50%; */

        }

        .box {
            position: absolute;
            border: 5px solid black;
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
            width: 200PX;
            height: 200px;
            border-radius: 50%;
            background-color: crimson;
            animation-name: anime;
            animation-duration: 2s;
            animation-timing-function: ease-in;
            animation-iteration-count: infinite;
            /* animation-direction: reverse; */
            animation-direction: alternate;
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */

        }

        .child {
           
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background-color: rgb(242, 242, 242);

        }
        .box1 {
            border-bottom-left-radius: 50%;
            border-bottom-right-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px;
            width: 200PX;
            height: 200px;
            border-radius: 50%;
            background-color: crimson;
            animation-name: anime;
            animation-delay: 3s;
            animation-duration: 2s;
            animation-timing-function: ease-in;
            animation-iteration-count: infinite;
            /* animation-direction: reverse; */
            animation-direction: alternate;
            /* animation: name duration timing-function delay iteration-count direction fill-mode; */

        }

        .child1 {
          
            width: 50%;
            height: 50%;
            border-radius: 50%;
            background-color: rgb(242, 242, 242);

        }

        .arrow{
            width: 100px;
            height: 100px;
            /* background-color: #000; */

            h1{

                color: rgb(0, 0, 0);
                animation: arr 3s ease-in-out 0s infinite alternate;
            }
        }
        @keyframes arr {
            0%{
                transform: translate(0px,0px);
            }
            40%{
                transform: translate(-30vw,30vh);

            }
            70%{
                transform: translate(-60vw,60vh);
            }
            100%{
                transform: translate(-80vw,99vh);
            }
            
        }

        @keyframes anime {
            0% {
                transform: translate(0px, 0px);
                opacity: 100%;

            }

            50% {
                transform: translateX(200px);
                opacity: 50%;
            }

            100% {
                transform: translate(100px, 99vh);
                /* transform: translate(200px,100px); */
                opacity: 0;

            }
        }

    </style>
</head>

<body>
    <div class="parent">
        <div class="box">
            <div class="child"></div>
        </div>
        <div class="box1">
            <div class="child1"></div>
        </div>
    </div>
    <div class="arrow">
        <h1><-----</h1>
    </div>
        
</body>

</html>
