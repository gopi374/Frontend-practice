<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        html,
        body {
          width: 100%;
          height: 100%;
        }
        .parent{
            height: 99vh;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3,1fr);
            /* grid-template-areas: 
              1   2     3   4   5
            1"red red black blue"
            2"pink green green blue"
            3"pink yellow yellow yellow"
            4; */
        }
        
        #black{

            /* grid-area: black; */
            grid-row: 1/2;
            grid-column: 3/4;
            background-color: #000;

        }
        #blue{
            grid-row: 1/2;
            grid-column: 4/5;
            /* grid-area: blue; */
            background-color: #1b3d72;

        }
        #yellow{
            /* grid-area: yellow; */
            background-color: #d0d303;

        }
        #pink{
            grid-row: 2/3;
            grid-column: 1/2;
            /* grid-area: pink; */
            background-color: #c51d8a;

        }
        #green{
            
            /* grid-area: green; */
            background-color: #06d303;

        }
        #red{
            grid-row: 1/2;
            grid-column: 1/3;
            /* grid-area: red; */
            background-color: #d30303;
        }
        .child{
            font-weight: 900;
            font-style: italic;
            font-family: 'medium-content-sans-serif-font, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif';
            padding: 16px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="red">Medium</div>
        <div class="child" id="black"></div>
        <div class="child" id="blue"></div>
        <div class="child" id="green"></div>
        <div class="child" id="pink"></div>
        <div class="child" id="yellow"></div>
    </div>
    
</body>
</html>
