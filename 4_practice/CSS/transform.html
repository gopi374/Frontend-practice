<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        html,
        body {
          width: 100%;
          height: 100%;
          background-color: #000;
        }
        .parent{
            margin: 50px;
            width: 99vw;
            height: 99vh;
            gap: 10px;
            background-color: #fff;
            display: flex;
            flex-wrap: wrap;
        }
        .child{
            text-align: center;
            width: 100px;
            height: 100px;
            padding: 20px;

            /* margin: %; */
            background-color: crimson;
            /* transform: rotateY(45deg); */
            /* transform: translate(10px,2px) rotate(125deg) scale(2,0.5); */
            /* transform: scale(3,0.5); */
            transform: translateY(50%);
            /* transition: 3; */
            /* transform: skewX(20deg); */

            /* transition-property: transform;
            transition-duration: 1s;
            transition-timing-function: ease-in-out;
            transition-delay: 0.1s; */
    
            transition: transform 4s cubic-bezier(0.07, 0, 1, 1.04),background-color 1.5s ease-in-out,transform .5s ease-in;

        }
        .child:hover{
            transform: translateY(99vh);
            background: #000;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"><h4>hello</h4> </div>
        <div class="child"></div>
        <div class="child">hello </div>
        <div class="child">hello </div>
        <div class="child">hello </div>
    </div>
</body>
</html>
