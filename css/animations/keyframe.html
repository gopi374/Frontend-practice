<html>
<head>
    <style>
        .box {
            width: 10px;
            height: 10px;
            background-color: transparent;
            animation-name: moveRight,slide,fadeIn;
                        /*animation-name: moveLeft;*/
            animation-duration: 2s;
            animation-iteration-count: infinite;
        }

        @keyframes moveRight {
        /*@keyframes moveLeft {*/
            from {
                transform: translateX(0);
            }
            to {
                transform: translateX(200px);
            }
        }
    </style>
</head>
<body>
    <div class="box"> >></div>
</body>
</html>
