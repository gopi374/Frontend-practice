<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document -display flex , flex-wrap , flex-grow</title>
    <style>         
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        html,
        body {
          width: 100%;
          height: 100%;
          background-color: #000;
        }
        .main{
            width: 100%;
            height: 50%;
            background: #35f1de;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            /* flex-grow: 2; */

        }
        .div{
            margin: 10px 10px 0px 10px;
            /* flex-grow: 2; */
            background-color: crimson;
            width: 200px;
            height: 200px;
            border: 2px solid white;
        }
        .middle{
            margin: 10px 10px 0px 10px;
            flex-grow: 1;
            background-color: crimson;
            width: 200px;
            height: 200px;
            border: 2px solid white;
        }

    </style>
</head>
<body>
    <div class="main">
        <div class="div"></div>
        <div class="div"></div>
        <div class="div"></div>
        <div class="div"></div>
        <div class="div"></div>
        <div class="div"></div>
        <div class="middle"></div>
        <div class="div"></div>
        <div class="div"></div>
        <div class="div"></div>
        <div class="div"></div>
        
    </div>
    
</body>
</html>
