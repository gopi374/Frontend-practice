<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
          margin: 0;
          padding: 0;
          box-sizing: border-box;
        }
        
        html,
        body {
          width: 100%;
          height: 100%;
          background-color: #000;
        }
        .parent{
            margin:20px 20px 0px 20px;
            border: 2px dashed white;
            height: 99vh;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(3,1fr);
            grid-template-areas: 
            "red red black blue"
            "pink green green blue"
            "pink yellow yellow yellow"
            ;
            border-top: 2px dashed #ffffff;          /* Top outer grid line */
            border-left: 2px dashed #ffffff; 

        }
        
        #black{
            grid-area: black;
            background-color: #000;

        }
        #blue{
            grid-area: blue;
            background-color: #1b3d72;

        }
        #yellow{
            grid-area: yellow;
            background-color: #d0d303;

        }
        #pink{
            grid-area: pink;
            background-color: #c51d8a;

        }
        #green{
            grid-area: green;
            background-color: #06d303;

        }
        #red{
            grid-area: red;
            background-color: #d30303;
        }
        .child{
            border-right: 2px dashed #ffffff;        /* Interior vertical & right lines */
            border-bottom: 2px dashed #ffffff;
            padding: 16px;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child" id="red"></div>
        <div class="child" id="black"></div>
        <div class="child" id="blue"></div>
        <div class="child" id="green"></div>
        <div class="child" id="pink"></div>
        <div class="child" id="yellow"></div>
    </div>
    
</body>
</html>
