<html>
<head>
	<style>
		.box {
			width: 100px;
			height: 100px;
			background-color: blue;
			animation: bounce 2s infinite;
		}
		@keyframes bounce {
			0% {
				transform: translateY(0);
			}

			50% {
				transform: translateY(-50px);
			}

			100% {
				transform: translateY(100px);
			}
		}
	</style>
</head>
<body>
	<div class="box"></div>
</body>

</html>
