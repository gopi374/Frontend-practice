<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form with Spline</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
  <div class="flex flex-col md:flex-row h-screen">
    
    <!-- Contact Form (Left Column) -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-8 bg-gray-900 z-10">
      <div class="bg-black bg-opacity-60 p-8 rounded-2xl shadow-2xl backdrop-blur-md w-full max-w-lg">

        <!-- Header with Robot -->
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-3xl font-bold">Contact Us</h2>
          <div class="w-[120px] h-[120px] md:w-[150px] md:h-[150px]">
            <iframe src="https://my.spline.design/robottutorialinteractiveeventscopy-0e4544fafe3958d8074d655b9a9a7d5d/"
              frameborder="0"
              class="w-full h-full rounded-lg"
              allowfullscreen>
            </iframe>
          </div>
        </div>

        <!-- Contact Form -->
        <form class="space-y-4">
          <div>
            <label class="block mb-1 font-medium">Name</label>
            <input type="text" placeholder="Your Name" class="w-full px-4 py-2 rounded-md bg-gray-800 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label class="block mb-1 font-medium">Email</label>
            <input type="email" placeholder="you@example.com" class="w-full px-4 py-2 rounded-md bg-gray-800 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
          </div>
          <div>
            <label class="block mb-1 font-medium">Message</label>
            <textarea placeholder="Write your message..." class="w-full px-4 py-2 rounded-md bg-gray-800 border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500" rows="4"></textarea>
          </div>
          <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 transition-colors px-4 py-2 rounded-md font-semibold">Send Message</button>
        </form>

      </div>
    </div>

    <!-- Empty Right Column (optional) -->
    <div class="hidden md:block w-full md:w-1/2 bg-gray-900"></div>

  </div>
</body>
</html>
