<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Model Contact Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(120deg, #a18cd1 0%, #fbc2eb 100%);
      animation: gradientBG 10s ease-in-out infinite alternate;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }
    .glass {
      background: rgba(255, 255, 255, 0.15);
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.18);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 1.5rem;
      border: 1.5px solid rgba(255,255,255,0.25);
    }
    .glow {
      box-shadow: 0 0 32px 4px #a18cd1, 0 0 0 4px #fbc2eb inset;
      transition: box-shadow 0.3s;
    }
    .glow:hover {
      box-shadow: 0 0 48px 12px #fbc2eb, 0 0 0 8px #a18cd1 inset;
    }
  </style>
</head>
<body class="bg-transparent text-gray-900 font-sans">
  <div class="flex flex-col md:flex-row h-screen items-center justify-center">
    <!-- 3D Model Showcase (Left Column) -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-8">
      <div class="w-[300px] h-[300px] md:w-[400px] md:h-[400px] glass glow flex items-center justify-center">
        <iframe src="https://my.spline.design/robottutorialinteractiveeventscopy-0e4544fafe3958d8074d655b9a9a7d5d/"
          frameborder="0"
          class="w-full h-full rounded-2xl"
          allowfullscreen
          title="3D Robot Large">
        </iframe>
      </div>
    </div>

    <!-- Contact Form (Right Column) -->
    <div class="w-full md:w-1/2 flex items-center justify-center p-8 z-10">
      <div class="glass p-8 rounded-2xl shadow-2xl w-full max-w-lg border border-purple-300">
        <div class="flex items-center justify-between mb-6">
          <h2 class="text-3xl font-extrabold tracking-tight text-purple-800">Contact Us</h2>
          <span class="inline-block w-10 h-10 bg-gradient-to-tr from-purple-400 to-pink-300 rounded-full shadow-lg"></span>
        </div>
        <form class="space-y-4" autocomplete="off">
          <div>
            <label for="name" class="block mb-1 font-semibold text-purple-700">Name</label>
            <input id="name" type="text" placeholder="Your Name" required
              class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-60 border border-purple-200 focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>
          <div>
            <label for="email" class="block mb-1 font-semibold text-purple-700">Email</label>
            <input id="email" type="email" placeholder="you@example.com" required
              class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-60 border border-purple-200 focus:outline-none focus:ring-2 focus:ring-purple-400 transition"/>
          </div>
          <div>
            <label for="message" class="block mb-1 font-semibold text-purple-700">Message</label>
            <textarea id="message" placeholder="Write your message..." required
              class="w-full px-4 py-2 rounded-lg bg-white bg-opacity-60 border border-purple-200 focus:outline-none focus:ring-2 focus:ring-purple-400 transition" rows="4"></textarea>
          </div>
          <button type="submit"
            class="w-full bg-gradient-to-r from-purple-500 to-pink-400 hover:from-pink-400 hover:to-purple-500 transition-colors px-4 py-2 rounded-lg font-bold shadow-lg text-white focus:outline-none focus:ring-2 focus:ring-purple-300">
            Send Message
          </button>
          <p id="form-message" class="text-green-600 text-center hidden mt-2">Thank you! We'll get back to you soon.</p>
        </form>
        <div class="flex justify-center gap-6 mt-8">
          <a href="mailto:info@example.com" class="hover:text-purple-600 transition" aria-label="Email">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2"
              viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round"
              d="M16 12H8m8 0a4 4 0 11-8 0 4 4 0 018 0zm0 0v4a4 4 0 01-8 0v-4"></path></svg>
          </a>
          <a href="https://twitter.com/" target="_blank" class="hover:text-purple-600 transition" aria-label="Twitter">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M23 3a10.9 10.9 0 01-3.14 1.53A4.48 4.48 0 0022.4.36a9.09 9.09 0 01-2.88 1.1A4.52 4.52 0 0016.11 0c-2.5 0-4.52 2.02-4.52 4.52 0 .35.04.7.11 1.03C7.69 5.4 4.07 3.6 1.64.96c-.38.65-.6 1.4-.6 2.2 0 1.52.77 2.86 1.94 3.65A4.48 4.48 0 01.96 6v.06c0 2.13 1.52 3.91 3.54 4.31-.37.1-.76.16-1.16.16-.28 0-.55-.03-.81-.08.56 1.74 2.18 3 4.1 3.03A9.06 9.06 0 010 19.54a12.8 12.8 0 006.92 2.03c8.3 0 12.85-6.88 12.85-12.85 0-.2 0-.39-.01-.58A9.22 9.22 0 0023 3z"/>
            </svg>
          </a>
          <a href="https://linkedin.com/" target="_blank" class="hover:text-purple-600 transition" aria-label="LinkedIn">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
              <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/>
            </svg>
          </a>
        </div>
      </div>
    </div>

    <!-- 3D Model Showcase (Right Column) -->  <script>
    <div class="hidden md:flex w-full md:w-1/2 items-center justify-center">
      <div class="w-[350px] h-[350px] glow rounded-2xl overflow-hidden">
        <iframe src="https://my.spline.design/robottutorialinteractiveeventscopy-0e4544fafe3958d8074d655b9a9a7d5d/"
          frameborder="0"
          class="w-full h-full"
          allowfullscreen('form-message').classList.add('hidden');
          title="3D Robot Large">
        </iframe>
      </div>
    </div>
  </div>
  <script>    // Simple form feedback    document.querySelector('form').addEventListener('submit', function(e) {      e.preventDefault();      document.getElementById('form-message').classList.remove('hidden');      setTimeout(() => {        document.getElementById('form-message').classList.add('hidden');        e.target.reset();      }, 2500);    });  </script></body></html>
