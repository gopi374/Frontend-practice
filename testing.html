<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Food Donation Website</title>
    <link rel="stylesheet" href="test.css" />
    <style>
      body {
          font-family: Arial, sans-serif;
          margin: 0;
          padding: 0;
          color: white;
          overflow: hidden;
      }
      header {
          background-color: rgba(255, 87, 34, 0.8);
          padding: 20px;
          text-align: center;
          position: relative;
          z-index: 1;
      }
      nav {
          margin: 20px 0;
      }
      nav a {
          margin: 0 15px;
          color: white;
          text-decoration: none;
          font-weight: bold;
      }
      .hero {
          position: relative;
          height: 100vh;
          overflow: hidden;
      }
      .hero video {
          position: absolute;
          top: 50%;
          left: 50%;
          min-width: 100%;
          min-height: 100%;
          width: auto;
          height: auto;
          z-index: 0;
          transform: translate(-50%, -50%);
          background: no-repeat;
          background-size: cover;
      }
      .hero-content {
          position: relative;
          z-index: 1;
          text-align: center;
          padding: 100px 20px;
      }
      .hero h1 {
          font-size: 3em;
          margin: 0;
      }
      .hero p {
          font-size: 1.5em;
      }
      .buttons {
          margin: 20px 0;
      }
      .button {
          background-color: #28a745;
          color: white;
          padding: 15px 30px;
          border: none;
          border-radius: 5px;
          cursor: pointer;
          font-size: 1.2em;
          text-decoration: none;
          display: inline-block;
          margin: 10px;
          transition: background-color 0.3s;
      }
      .button:hover {
          background-color: #218838;
      }
      footer {
          text-align: center;
          padding: 20px;
          background-color: rgba(255, 87, 34, 0.8);
          position: relative;
          bottom: 0;
          width: 100%;
      }
      .icon {
          font-size: 2em;
          margin: 10px;
      } 
    </style>
  </head>
  <body>
    <header>
      <h1>Food Donation Website</h1>
      <nav>
        <a href="#about">About Us</a>
        <a href="#contact">Contact</a>
        <a href="#volunteer">Volunteer</a>
      </nav>
    </header>

    <div class="hero">
      <video autoplay muted loop>
        <source
          src="https://www.w3schools.com/html/mov_bb.mp4"
          type="video/mp4"
        />
        Your browser does not support HTML5 video.
      </video>
      <div class="hero-content">
        <h1>Help Us Fight Hunger</h1>
        <p>Your contribution can make a difference!</p>
        <div class="buttons">
          <a href="#donate" class="button">Donate Food</a>
          <a href="#volunteer" class="button">Login as a Volunteer</a>
        </div>
        <div>
          <a href="#donate" class="icon"><i class="fas fa-utensils"></i></a>
          <a href="#volunteer" class="icon"
            ><i class="fas fa-hands-helping"></i
          ></a>
          <a href="#contact" class="icon"><i class="fas fa-envelope"></i></a>
        </div>
      </div>
    </div>

    <footer>
      <p>&copy; 2023 Food Donation Website. All rights reserved.</p>
    </footer>
  </body>
</html>
