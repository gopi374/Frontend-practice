<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Example CSS for visibility */
        .chatbot-container {
            display: none; /* Initially hidden */
            border: 2px solid #18d0e1;
            width: 300px;
            position: fixed;
            bottom: 80px;
            right: 20px;
            background-color: white;
        }
        .chatbot-header {
            background-color: #007bff;
            color: white;
            padding: 10px;
            cursor: pointer;
        }
        .chatbot-messages {
            height: 200px;
            overflow-y: auto;
            padding: 10px;
        }
        .message {
            margin-bottom: 10px;
        }
        .user-message {
            text-align: right;
            color: blue;
        }
        .bot-message {
            text-align: left;
            color: rgb(147, 246, 205);
        }
        #send-button{
            text-align: left;
            background: #17bec4;
            margin: 0px 0px 0px 127px;
        }
        .input{
            border: none;
        }
    </style>
</head>
<body>
    <div class="chatbot-icon" onclick="toggleChat()">
        <img src="chatbot.png" alt="Chatbot Icon" />
    </div>
    
    <div class="chatbot-container" id="chatbot">
        <div class="chatbot-header" onclick="toggleChat()">
            Food management Helpdesk !!
        </div>
        <div class="chatbot-messages" id="chat-display">
            <div class="message bot-message">Hello! How can I help you today?</div>
        </div>
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="sendMessage(event)">
        <button id="send-button">Send</button>
    </div>

    <script src="script.js"></script>

    <script>
        function toggleChat() {
            const chatbot = document.getElementById("chatbot");
            chatbot.style.display = chatbot.style.display === "none" || chatbot.style.display === "" ? "block" : "none";
        }

        function sendMessage(event) {
            if (event.key === "Enter") {
                const userInput = document.getElementById("user-input");
                const userMessage = userInput.value.trim();
                if (userMessage) {
                    appendMessage(userMessage, true);
                    userInput.value = "";
                    // Here you would call your function to get the bot response
                }
            }
        }

        function appendMessage(content, isUser = false) {
            const chatDisplay = document.getElementById("chat-display");
            const messageElement = document.createElement("div");
            messageElement.classList.add("message", isUser ? "user-message" : "bot-message");
            messageElement.textContent = content;
            chatDisplay.appendChild(messageElement);
            chatDisplay.scrollTop = chatDisplay.scrollHeight; // Scroll to the bottom
        }
    </script>
</body>
</html>
